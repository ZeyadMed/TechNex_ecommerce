name: e_commerce
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.4
  dio: ^5.7.0
  http: ^1.6.0
  easy_localization: ^3.0.7
  equatable: ^2.0.5
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_bloc: ^8.1.6
  flutter_local_notifications: ^19.3.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.14
  get_it: ^8.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  internet_connection_checker_plus: ^2.7.1
  path_provider: ^2.1.5
  pretty_dio_logger: ^1.4.0
  shimmer: ^3.0.0
  timezone: ^0.10.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  permission_handler: ^11.3.1
  go_router: ^16.1.0
  pin_code_fields: ^8.0.1
  pinput: ^5.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  location: ^8.0.1
  flutter_image_compress: ^2.4.0
  flutter_assets_generator: ^0.1.0
  icons_launcher: ^3.0.1
  shared_preferences: ^2.5.3
  intl_phone_field: ^3.2.0
  loading_animation_widget: ^1.3.0
  logger: ^2.5.0
  lottie: ^3.3.1
  gap: ^3.0.1
  carousel_slider: ^5.1.1
  font_awesome_flutter: ^10.8.0
  pin_code_text_field: ^1.8.0

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  fonts:
  - family: Diodrum
    fonts:
      - asset: assets/fonts/DiodrumArabic-Regular.ttf
        weight: 400
      - asset: assets/fonts/DiodrumArabic-Regular-1.ttf
        weight: 400  # لو ده duplicate للـ Regular، حدد 400 برضو
      - asset: assets/fonts/DiodrumArabic-Medium-1.ttf
        weight: 500
      - asset: assets/fonts/DiodrumArabic-Semibold-1.ttf
        weight: 600
      - asset: assets/fonts/DiodrumArabic-Bold-1.ttf
        weight: 700  



  assets:
    - assets/svg/
    - assets/fonts/
    - assets/images/
    - assets/translations/

flutter_assets:
  assets_path: assets/
  output_path: lib/core/style/
  filename: assets.dart
